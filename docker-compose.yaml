services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "883:883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/passwd.txt:/mosquitto/passwd.txt:ro

  mailhog:
    image: mailhog/mailhog:latest
    container_name: iot-smtp
    ports:
      - "1025:1025"
      - "8025:8025"

  nodered:
    image: nodered/node-red:latest
    ports:
      - "1880:1880"
    depends_on:
      - mosquitto
      - mailhog

  martini_temperature:
    build: ./sensor-temperature
    depends_on:
      - mosquitto
    environment:
      SENSOR_NAME: martini_temperature
      MIN_VALUE: 18
      MAX_VALUE: 26
      GUARD_LEVEL: 24
      MQTT_HOST: mosquitto
      MQTT_PORT: 883
      MQTT_USERNAME: ${MQTT_USERNAME:?Set MQTT_USERNAME in .env}
      MQTT_PASSWORD: ${MQTT_PASSWORD:?Set MQTT_PASSWORD in .env}

  martini_humidity:
    build: ./sensor-humidity
    depends_on:
      - mosquitto
    environment:
      SENSOR_NAME: martini_humidity
      MIN_VALUE: 60
      MAX_VALUE: 75
      GUARD_LEVEL: 72
      MQTT_HOST: mosquitto
      MQTT_PORT: 883
      MQTT_USERNAME: ${MQTT_USERNAME:?Set MQTT_USERNAME in .env}
      MQTT_PASSWORD: ${MQTT_PASSWORD:?Set MQTT_PASSWORD in .env}


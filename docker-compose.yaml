x-mqtt-temperature-sensor-base: &mqtt-temperature-sensor-base
  build: ./sensor-temperature
  depends_on:
    - mosquitto

x-mqtt-temperature-sensor-environment: &mqtt-temperature-sensor-environment
  MQTT_HOST: mosquitto
  MQTT_PORT: 883
  MQTT_USERNAME: ${MQTT_USERNAME:?Set MQTT_USERNAME in .env}
  MQTT_PASSWORD: ${MQTT_PASSWORD:?Set MQTT_PASSWORD in .env}

services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "883:883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/passwd.txt:/mosquitto/passwd.txt:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  nodered:
    image: nodered/node-red:latest
    ports:
      - "1880:1880"
    volumes:
      - nodered-data:/data
    depends_on:
      - mosquitto
      - influxdb

  influxdb:
    image: influxdb:2
    container_name: iot-influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}

  telegraf:
    image: telegraf:latest
    container_name: mqtt-gateway
    depends_on:
      - mosquitto
      - influxdb
    volumes:
      - ./telegraf.conf:/etc/telegraf/telegraf.conf:ro

  mqtt_temperature_01:
    <<: *mqtt-temperature-sensor-base
    environment:
      <<: *mqtt-temperature-sensor-environment
      SENSOR_NAME: mqtt_temperature_01

  mqtt_temperature_02:
    <<: *mqtt-temperature-sensor-base
    environment:
      <<: *mqtt-temperature-sensor-environment
      SENSOR_NAME: mqtt_temperature_02

  mqtt_temperature_03:
    <<: *mqtt-temperature-sensor-base
    environment:
      <<: *mqtt-temperature-sensor-environment
      SENSOR_NAME: mqtt_temperature_03

  mqtt_temperature_04:
    <<: *mqtt-temperature-sensor-base
    environment:
      <<: *mqtt-temperature-sensor-environment
      SENSOR_NAME: mqtt_temperature_04

  mqtt_temperature_05:
    <<: *mqtt-temperature-sensor-base
    environment:
      <<: *mqtt-temperature-sensor-environment
      SENSOR_NAME: mqtt_temperature_05

  mqtt_temperature_06:
    <<: *mqtt-temperature-sensor-base
    environment:
      <<: *mqtt-temperature-sensor-environment
      SENSOR_NAME: mqtt_temperature_06

  mqtt_temperature_07:
    <<: *mqtt-temperature-sensor-base
    environment:
      <<: *mqtt-temperature-sensor-environment
      SENSOR_NAME: mqtt_temperature_07

  mqtt_temperature_08:
    <<: *mqtt-temperature-sensor-base
    environment:
      <<: *mqtt-temperature-sensor-environment
      SENSOR_NAME: mqtt_temperature_08

  mqtt_temperature_09:
    <<: *mqtt-temperature-sensor-base
    environment:
      <<: *mqtt-temperature-sensor-environment
      SENSOR_NAME: mqtt_temperature_09

  mqtt_temperature_10:
    <<: *mqtt-temperature-sensor-base
    environment:
      <<: *mqtt-temperature-sensor-environment
      SENSOR_NAME: mqtt_temperature_10

volumes:
  influxdb-data:
  mosquitto-data:
  mosquitto-log:
  nodered-data:

[agent]
  interval = "1s"
  flush_interval = "1s"

###############################################################################
# INPUT MQTT: reads temperature messages from the sensors.
###############################################################################
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:883"]
  topics = ["sensors/+/temperature"]
  qos = 1
  client_id = "telegraf-mqtt-gateway"
  persistent_session = true
  connection_timeout = "30s"
  username = "tempuser"
  password = "password"

  data_format = "json"
  name_override = "temperature"
  tag_keys = ["sensor", "type", "unit"]
  json_time_key = "timestamp"
  json_time_format = "2006-01-02T15:04:05Z07:00"

###############################################################################
# OUTPUT MQTT: republishes normalized messages for Node-RED/debug consumers.
###############################################################################
[[outputs.mqtt]]
  servers = ["tcp://mosquitto:883"]
  topic = "gateway/aula/temperatura"
  qos = 1
  username = "tempuser"
  password = "password"
  data_format = "json"

###############################################################################
# OUTPUT INFLUXDB: writes historical sensor data.
###############################################################################
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "iot-super-secret-token"
  organization = "iot"
  bucket = "sensors"
